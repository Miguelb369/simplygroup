<!DOCTYPE html>
<html>
<head>
  <title>Silkali Sheet Cutting Optimiser</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; background: #fafafa; text-align: center; }
    h2, h3, h4 { text-align: center; }

    .container { display: flex; justify-content: center; gap: 20px; }

    .panel {
      width: 340px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    #boardContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      margin: auto;
      gap: 10px;
    }

    .boardWrap { display: inline-block; }
    .boardTitle { font-size: 12px; text-align: center; margin: 6px 0 2px; color: #444; }

    .board {
      position: relative;
      width: 400px;
      height: 200px;
      border: 2px solid black;
      background: white;
      user-select: none;
    }

    .piece {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid black;
      box-sizing: border-box;
      cursor: grab;
      user-select: none;
    }

    .piece.dragging {
      opacity: 0.85;
      cursor: grabbing;
      outline: 2px dashed #333;
    }

    .piece.invalid {
      outline: 2px solid #d00;
    }

    .offcut-item {
      padding: 6px;
      margin: 4px 0;
      background: #eee;
      font-size: 12px;
      border-radius: 6px;
    }

    button, input, select {
      padding: 6px;
      margin: 4px 0;
      width: 100%;
      box-sizing: border-box;
    }

    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }

    .muted { color: #666; font-size: 12px; }
    .smallbtn { width: auto; padding: 6px 10px; }
    .btnrow { display: flex; gap: 8px; }
  </style>
</head>

<body>

<h2>Silkali Sheet Cutting Optimiser</h2>

<div class="container">

  <div class="panel">

    <label>Preset size</label>
    <select id="presetSize"></select>

    <div class="row">
      <div>
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1">
      </div>
      <div>
        <label>Rotation allowed</label><br>
        <input type="checkbox" id="rotate" style="width:auto; transform: translateY(2px);">
      </div>
    </div>

    <button onclick="addCut()">Add cut</button>

    <h4>Cut priority list</h4>
    <div id="priorityList"></div>

    <hr>

    <div class="row">
      <div>
        <label>Boards</label>
        <input type="number" id="boardCount" value="1" min="1">
      </div>
      <div>
        <label>Kerf (mm)</label>
        <input type="number" id="kerfMm" value="6" min="0" step="0.1">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Extra spacing (mm)</label>
        <input type="number" id="gapMm" value="0" min="0" step="0.1">
      </div>
      <div>
        <label>Snap (mm)</label>
        <input type="number" id="snapMm" value="1" min="0" step="0.5">
      </div>
    </div>

    <button onclick="optimise()">Optimise layout</button>
    <button onclick="exportLayoutJPG()">Export layout image</button>

    <div class="btnrow">
      <button class="smallbtn" onclick="saveState()">Save</button>
      <button class="smallbtn" onclick="loadState()">Load</button>
      <button class="smallbtn" onclick="resetAll()">Reset</button>
    </div>

    <div class="muted">
      Drag pieces to adjust. Double-click a piece to rotate (if allowed).
    </div>

  </div>

  <div style="min-width: 640px;">

    <h3>Board layout</h3>
    <div id="boardContainer"></div>

    <h3>Offcuts</h3>
    <div class="muted" style="margin-bottom:6px;">
      Offcuts reflect the last optimiser run (not recomputed after manual dragging).
    </div>
    <div id="offcutViewer"></div>

    <h3>Recommended order</h3>
    <div id="recommendationPanel"></div>

    <div id="results" style="margin-top:10px; font-weight:bold;"></div>

  </div>

</div>

<script>
/* CONFIG */
const boardW = 8;
const boardH = 4;
const scale = 50;

/* PRESETS */
const presetSizes = [
  "0.82,0.82","1,1","1.64,0.82","1.64,1.64",
  "2,1","2,2",
  "3,1","3,2","3,3",
  "4,1","4,2","4,3","4,4",
  "5,1","5,2","5,3","5,4",
  "6,1","6,2","6,3","6,4",
  "8,1","8,2","8,3","8,4"
];

const dropdown = document.getElementById("presetSize");
presetSizes.forEach(s => {
  const opt = document.createElement("option");
  opt.value = s;
  opt.innerText = s.replace(",", " x ");
  dropdown.appendChild(opt);
});

/* STATE */
let cuts = [];
let placements = []; // {id, x,y,w,h,color,board, cutW,cutH, rotatable}
let stock = [];

const colours = ["#ff9999","#99ccff","#99ff99","#ffcc99","#cc99ff","#ffff99"];

const boardContainer = document.getElementById("boardContainer");
const priorityList = document.getElementById("priorityList");
const offcutViewer = document.getElementById("offcutViewer");
const recommendationPanel = document.getElementById("recommendationPanel");
const results = document.getElementById("results");

/* Fool-proof flag: prevents exporting old layouts after cuts/settings change */
let layoutIsCurrent = false;

function markLayoutOutdated() {
  layoutIsCurrent = false;
  results.innerHTML = `<span style="color:#b00;">Layout out of date — please optimise again.</span>`;
}

function mmToFt(mm) { return mm / 304.8; }

function getKerfFt() {
  const kerfMm = parseFloat(document.getElementById("kerfMm").value || "0");
  return Math.max(0, mmToFt(kerfMm));
}

function getGapFt() {
  const gapMm = parseFloat(document.getElementById("gapMm").value || "0");
  return Math.max(0, mmToFt(gapMm));
}

function getSnapFt() {
  const snapMm = parseFloat(document.getElementById("snapMm").value || "0");
  return Math.max(0, mmToFt(snapMm));
}

function effectiveCutSpacingFt() {
  // Used in optimiser splits + manual collision rules
  return getKerfFt() + getGapFt();
}

/* CUT QUEUE */
function addCut() {
  const size = presetSize.value;
  if (!size) return;

  const [w, h] = size.split(",").map(Number);
  const q = parseInt(document.getElementById("qty").value, 10);
  const rot = document.getElementById("rotate").checked;

  // Merge duplicates: prevents separate identical lines getting missed by operators
  const existing = cuts.find(c => c.w === w && c.h === h && c.rotate === rot);
  if (existing) {
    existing.qty += q;
  } else {
    cuts.push({
      w, h,
      qty: q,
      rotate: rot,
      color: colours[cuts.length % colours.length]
    });
  }

  markLayoutOutdated();
  renderPriorityList();
  saveState();
}

function renderPriorityList() {
  priorityList.innerHTML = "";
  cuts.forEach((c, index) => {
    const div = document.createElement("div");
    div.className = "offcut-item";
    div.innerHTML =
      `${c.w}x${c.h} | Qty:${c.qty} | Rotate:${c.rotate ? "Yes" : "No"}
      <span style="float:right;color:red;cursor:pointer" onclick="removeCut(${index})">✖</span>`;
    priorityList.appendChild(div);
  });
}

function removeCut(i) {
  cuts.splice(i, 1);
  markLayoutOutdated();
  renderPriorityList();
  saveState();
}

/* OPTIMISER */
function optimise() {
  placements = [];
  stock = [];
  boardContainer.innerHTML = "";
  offcutViewer.innerHTML = "";
  recommendationPanel.innerHTML = "";
  results.innerHTML = "";

  const boards = parseInt(document.getElementById("boardCount").value, 10);
  const spacing = effectiveCutSpacingFt();

  // Initialise stock rectangles (one per board)
  for (let i = 0; i < boards; i++) {
    stock.push({ x: 0, y: 0, w: boardW, h: boardH, board: i });
  }

  let usedArea = 0;

  // Sort cuts by descending area
  cuts.sort((a, b) => (b.w * b.h) - (a.w * a.h));

  let pieceId = 1;

  for (const cut of cuts) {
    let remaining = cut.qty;

    while (remaining > 0) {
      let bestIndex = -1;
      let bestOri = null;
      let bestScore = Infinity;

      for (let i = 0; i < stock.length; i++) {
        const rect = stock[i];

        const orientations = [
          { w: cut.w, h: cut.h },
          ...(cut.rotate ? [{ w: cut.h, h: cut.w }] : [])
        ];

        for (const ori of orientations) {
          if (ori.w > rect.w || ori.h > rect.h) continue;

          const waste = (rect.w - ori.w) * (rect.h - ori.h);
          if (waste < bestScore) {
            bestScore = waste;
            bestIndex = i;
            bestOri = ori;
          }
        }
      }

      if (bestIndex === -1) break;

      const rect = stock[bestIndex];

      // Place piece
      placements.push({
        id: pieceId++,
        x: rect.x,
        y: rect.y,
        w: bestOri.w,
        h: bestOri.h,
        cutW: cut.w,
        cutH: cut.h,
        rotatable: cut.rotate,
        color: cut.color,
        board: rect.board
      });

      usedArea += bestOri.w * bestOri.h;

      // Split stock with kerf+gap spacing
      const right = {
        x: rect.x + bestOri.w + spacing,
        y: rect.y,
        w: rect.w - bestOri.w - spacing,
        h: rect.h,
        board: rect.board
      };

      const bottom = {
        x: rect.x,
        y: rect.y + bestOri.h + spacing,
        w: rect.w,
        h: rect.h - bestOri.h - spacing,
        board: rect.board
      };

      if (right.w > 0 && right.h > 0) stock.push(right);
      if (bottom.w > 0 && bottom.h > 0) stock.push(bottom);

      stock.splice(bestIndex, 1);
      remaining--;
    }
  }

  const requestedPieces = cuts.reduce((s, c) => s + c.qty, 0);
  if (placements.length < requestedPieces) {
    alert("Layout cannot place all cuts within available boards.");
  }

  drawBoards(boards);

  const totalBoardArea = boards * boardW * boardH;
  const efficiency = ((usedArea / totalBoardArea) * 100).toFixed(1);
  results.innerHTML = "Material efficiency: " + efficiency + "%";

  renderOffcuts();
  renderRecommendation();

  layoutIsCurrent = true;
  saveState();
}

/* DRAW + DRAG */
function drawBoards(count) {
  boardContainer.innerHTML = "";

  for (let b = 0; b < count; b++) {
    const wrap = document.createElement("div");
    wrap.className = "boardWrap";

    const title = document.createElement("div");
    title.className = "boardTitle";
    title.textContent = `Board ${b + 1}`;

    const div = document.createElement("div");
    div.className = "board";
    div.dataset.board = String(b);

    wrap.appendChild(title);
    wrap.appendChild(div);
    boardContainer.appendChild(wrap);
  }

  placements.forEach(p => {
    const boardEl = document.querySelector(`.board[data-board="${p.board}"]`);
    if (!boardEl) return;

    const piece = document.createElement("div");
    piece.className = "piece";
    piece.dataset.id = String(p.id);

    applyPieceStyles(piece, p);

    piece.addEventListener("mousedown", onPieceMouseDown);
    piece.addEventListener("dblclick", () => rotatePiece(p.id));

    boardEl.appendChild(piece);
  });
}

function applyPieceStyles(pieceEl, p) {
  pieceEl.style.left = (p.x * scale) + "px";
  pieceEl.style.top = (p.y * scale) + "px";
  pieceEl.style.width = (p.w * scale) + "px";
  pieceEl.style.height = (p.h * scale) + "px";
  pieceEl.style.background = p.color;
  pieceEl.textContent = `${p.w}x${p.h}`;
}

let drag = null;

function onPieceMouseDown(e) {
  const pieceEl = e.currentTarget;
  const id = parseInt(pieceEl.dataset.id, 10);
  const p = placements.find(pp => pp.id === id);
  if (!p) return;

  const boardEl = pieceEl.parentElement;
  const boardRect = boardEl.getBoundingClientRect();

  pieceEl.classList.add("dragging");

  const startMouseX = e.clientX;
  const startMouseY = e.clientY;

  const startX = p.x;
  const startY = p.y;
  const startBoard = p.board;

  const offsetXpx = startMouseX - (boardRect.left + (p.x * scale));
  const offsetYpx = startMouseY - (boardRect.top + (p.y * scale));

  drag = {
    id,
    pieceEl,
    startX, startY, startBoard,
    offsetXpx, offsetYpx
  };

  window.addEventListener("mousemove", onPieceMouseMove);
  window.addEventListener("mouseup", onPieceMouseUp);
}

function smartSnap(id, boardIndex, x, y, w, h) {
  const tol = getSnapFt();
  const spacing = effectiveCutSpacingFt();

  // Board edge snaps
  const candidatesX = [0, boardW - w];
  const candidatesY = [0, boardH - h];

  // Piece-to-piece edge snaps (same board)
  for (const other of placements) {
    if (other.id === id || other.board !== boardIndex) continue;

    candidatesX.push(other.x);
    candidatesX.push(other.x + other.w + spacing);
    candidatesX.push(other.x - spacing - w);

    candidatesY.push(other.y);
    candidatesY.push(other.y + other.h + spacing);
    candidatesY.push(other.y - spacing - h);
  }

  let bestX = x;
  let bestDx = tol + 1;
  for (const cx of candidatesX) {
    const dx = Math.abs(cx - x);
    if (dx <= tol && dx < bestDx) {
      bestDx = dx;
      bestX = cx;
    }
  }

  let bestY = y;
  let bestDy = tol + 1;
  for (const cy of candidatesY) {
    const dy = Math.abs(cy - y);
    if (dy <= tol && dy < bestDy) {
      bestDy = dy;
      bestY = cy;
    }
  }

  bestX = Math.max(0, Math.min(boardW - w, bestX));
  bestY = Math.max(0, Math.min(boardH - h, bestY));

  return { x: bestX, y: bestY };
}

function onPieceMouseMove(e) {
  if (!drag) return;

  const pieceEl = drag.pieceEl;

  // Which board are we over?
  const boards = Array.from(document.querySelectorAll(".board"));
  let targetBoardEl = null;

  for (const b of boards) {
    const r = b.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
      targetBoardEl = b;
      break;
    }
  }

  if (!targetBoardEl) targetBoardEl = pieceEl.parentElement;

  const targetBoard = parseInt(targetBoardEl.dataset.board, 10);
  const targetRect = targetBoardEl.getBoundingClientRect();

  if (pieceEl.parentElement !== targetBoardEl) {
    targetBoardEl.appendChild(pieceEl);
  }

  const xPx = (e.clientX - targetRect.left) - drag.offsetXpx;
  const yPx = (e.clientY - targetRect.top) - drag.offsetYpx;

  let xFt = xPx / scale;
  let yFt = yPx / scale;

  // Grid snap
  const snap = getSnapFt();
  if (snap > 0) {
    xFt = Math.round(xFt / snap) * snap;
    yFt = Math.round(yFt / snap) * snap;
  }

  const p = placements.find(pp => pp.id === drag.id);

  // Clamp
  xFt = Math.max(0, Math.min(boardW - p.w, xFt));
  yFt = Math.max(0, Math.min(boardH - p.h, yFt));

  // Edge snap to board + neighbouring pieces (maintains kerf+gap spacing)
  const snapped = smartSnap(drag.id, targetBoard, xFt, yFt, p.w, p.h);
  xFt = snapped.x;
  yFt = snapped.y;

  pieceEl.style.left = (xFt * scale) + "px";
  pieceEl.style.top = (yFt * scale) + "px";

  const valid = isPlacementValid(drag.id, targetBoard, xFt, yFt, p.w, p.h);
  pieceEl.classList.toggle("invalid", !valid);
}

function onPieceMouseUp() {
  if (!drag) return;

  window.removeEventListener("mousemove", onPieceMouseMove);
  window.removeEventListener("mouseup", onPieceMouseUp);

  const id = drag.id;
  const pieceEl = drag.pieceEl;

  pieceEl.classList.remove("dragging");

  const boardEl = pieceEl.parentElement;
  const targetBoard = parseInt(boardEl.dataset.board, 10);

  const leftPx = parseFloat(pieceEl.style.left || "0");
  const topPx = parseFloat(pieceEl.style.top || "0");

  const xFt = leftPx / scale;
  const yFt = topPx / scale;

  const p = placements.find(pp => pp.id === id);
  const valid = isPlacementValid(id, targetBoard, xFt, yFt, p.w, p.h);

  if (!valid) {
    // Revert
    p.x = drag.startX;
    p.y = drag.startY;
    p.board = drag.startBoard;

    const originalBoardEl = document.querySelector(`.board[data-board="${p.board}"]`);
    if (originalBoardEl && pieceEl.parentElement !== originalBoardEl) originalBoardEl.appendChild(pieceEl);

    applyPieceStyles(pieceEl, p);
    pieceEl.classList.remove("invalid");
  } else {
    // Commit
    p.x = xFt;
    p.y = yFt;
    p.board = targetBoard;
    pieceEl.classList.remove("invalid");
    saveState();
  }

  drag = null;
}

function isPlacementValid(movingId, boardIndex, x, y, w, h) {
  if (x < 0 || y < 0 || x + w > boardW || y + h > boardH) return false;

  const minGap = effectiveCutSpacingFt(); // kerf + gap

  const ax1 = x - minGap;
  const ay1 = y - minGap;
  const ax2 = x + w + minGap;
  const ay2 = y + h + minGap;

  for (const other of placements) {
    if (other.id === movingId) continue;
    if (other.board !== boardIndex) continue;

    const bx1 = other.x;
    const by1 = other.y;
    const bx2 = other.x + other.w;
    const by2 = other.y + other.h;

    const overlap = !(ax2 <= bx1 || ax1 >= bx2 || ay2 <= by1 || ay1 >= by2);
    if (overlap) return false;
  }

  return true;
}

function rotatePiece(id) {
  const p = placements.find(pp => pp.id === id);
  if (!p || !p.rotatable) return;

  const newW = p.h;
  const newH = p.w;

  let x = p.x;
  let y = p.y;

  x = Math.max(0, Math.min(boardW - newW, x));
  y = Math.max(0, Math.min(boardH - newH, y));

  const valid = isPlacementValid(id, p.board, x, y, newW, newH);
  if (!valid) return;

  p.w = newW;
  p.h = newH;
  p.x = x;
  p.y = y;

  const pieceEl = document.querySelector(`.piece[data-id="${id}"]`);
  if (pieceEl) applyPieceStyles(pieceEl, p);

  saveState();
}

/* OFFCUTS */
function renderOffcuts() {
  offcutViewer.innerHTML = "";
  stock.forEach(o => {
    if (o.w <= 0 || o.h <= 0) return;
    const div = document.createElement("div");
    div.className = "offcut-item";
    div.textContent = `Offcut ${o.w.toFixed(2)} x ${o.h.toFixed(2)}`;
    offcutViewer.appendChild(div);
  });
}

/* RECOMMENDATION */
function renderRecommendation() {
  const sorted = [...cuts].sort((a, b) => (b.w * b.h) - (a.w * a.h));
  recommendationPanel.innerHTML = "<b>Recommended cutting order:</b><br>";
  sorted.forEach((c, i) => {
    recommendationPanel.innerHTML += `${i + 1}. Cut ${c.w}x${c.h} | Qty:${c.qty}<br>`;
  });
}

/* EXPORT */
async function exportLayoutJPG() {
  if (!layoutIsCurrent) {
    alert("Layout is out of date. Please optimise before exporting.");
    return;
  }
  const canvas = await html2canvas(boardContainer, { scale: 2 });
  const link = document.createElement("a");
  link.download = "layout.jpg";
  link.href = canvas.toDataURL("image/jpeg", 0.9);
  link.click();
}

/* PERSISTENCE */
const STORAGE_KEY = "silkali_cut_planner_state_v3";

function saveState() {
  const state = {
    cuts,
    placements,
    stock,
    boardCount: document.getElementById("boardCount").value,
    kerfMm: document.getElementById("kerfMm").value,
    gapMm: document.getElementById("gapMm").value,
    snapMm: document.getElementById("snapMm").value,
    layoutIsCurrent
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;

  try {
    const state = JSON.parse(raw);

    cuts = Array.isArray(state.cuts) ? state.cuts : [];
    placements = Array.isArray(state.placements) ? state.placements : [];
    stock = Array.isArray(state.stock) ? state.stock : [];

    document.getElementById("boardCount").value = state.boardCount ?? "1";
    document.getElementById("kerfMm").value = state.kerfMm ?? "6";
    document.getElementById("gapMm").value = state.gapMm ?? "0";
    document.getElementById("snapMm").value = state.snapMm ?? "1";
    layoutIsCurrent = !!state.layoutIsCurrent;

    renderPriorityList();
    drawBoards(parseInt(document.getElementById("boardCount").value, 10));
    renderOffcuts();
    renderRecommendation();

    if (!layoutIsCurrent && cuts.length > 0) {
      markLayoutOutdated();
    }

  } catch (e) {
    console.error(e);
  }
}

/* RESET */
function resetAll() {
  cuts = [];
  placements = [];
  stock = [];
  boardContainer.innerHTML = "";
  priorityList.innerHTML = "";
  offcutViewer.innerHTML = "";
  recommendationPanel.innerHTML = "";
  results.innerHTML = "";
  localStorage.removeItem(STORAGE_KEY);
  layoutIsCurrent = false;
}

/* Mark outdated when key inputs change */
["boardCount","kerfMm","gapMm"].forEach(id=>{
  document.getElementById(id).addEventListener("change", markLayoutOutdated);
});

/* Auto-load on open */
loadState();
renderPriorityList();

</script>

</body>

</html>
